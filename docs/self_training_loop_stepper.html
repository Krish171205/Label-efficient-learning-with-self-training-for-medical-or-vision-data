
<style>
  .st-wrap { font-family: var(--font-sans); padding: 0 0 1rem; }

  .st-dot.active { background: var(--color-text-primary); }
  .st-dot.done { background: var(--color-text-success); }
  .st-label { font-size: 12px; color: var(--color-text-secondary); margin-left: 4px; }
  .st-panel { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .st-header { padding: 12px 16px; background: var(--color-background-secondary); display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .st-step-num { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; }
  .st-title { font-size: 14px; font-weight: 500; }
  .st-body { padding: 14px 16px; display: flex; gap: 14px; }
  .st-visual { flex: 0 0 220px; }
  .st-explain { flex: 1; }
  .st-explain h4 { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .st-explain p { font-size: 13px; color: var(--color-text-secondary); line-height: 1.65; margin-bottom: 8px; }
  .st-explain p strong { color: var(--color-text-primary); font-weight: 500; }
  .insight { background: var(--color-background-tertiary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; border-left: 2px solid var(--color-border-secondary); border-radius: 0; }
  .insight strong { color: var(--color-text-primary); font-weight: 500; }
  .st-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 0.5px solid var(--color-border-tertiary); }
  .st-iter { font-size: 12px; color: var(--color-text-tertiary); }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bar-label { font-size: 11px; color: var(--color-text-secondary); width: 68px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: var(--color-background-tertiary); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
  .bar-val { font-size: 11px; color: var(--color-text-secondary); width: 34px; flex-shrink: 0; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .pill { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
  .pill-labeled { background: var(--color-background-info); color: var(--color-text-info); }
  .pill-pseudo { background: var(--color-background-warning); color: var(--color-text-warning); }
  .pill-unlabeled { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .pill-rejected { background: var(--color-background-danger); color: var(--color-text-danger); }
</style>

<div class="st-wrap">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
    <div class="st-progress" id="progress-dots"></div>
    <span class="st-label" id="step-counter"></span>
  </div>

  <div class="st-panel">
    <div class="st-header">
      <span class="st-step-num pill pill-labeled" id="step-badge"></span>
      <span class="st-title" id="step-title"></span>
    </div>
    <div class="st-body">
      <div class="st-visual">
        <svg width="100%" viewBox="0 0 220 180" id="step-svg"></svg>
      </div>
      <div class="st-explain">
        <h4 id="explain-label"></h4>
        <p id="explain-main"></p>
        <div class="insight" id="explain-insight"></div>
      </div>
    </div>
    <div class="st-nav">
      <button onclick="prevStep()" id="btn-prev">← prev</button>
      <span class="st-iter" id="step-iter"></span>
      <button onclick="nextStep()" id="btn-next">next →</button>
    </div>
  </div>
</div>

let cur = 0;

function render() {
  const s = steps[cur];
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = steps.map((_, i) =>
    `<div class="st-dot ${i < cur ? 'done' : i === cur ? 'active' : ''}"></div>`
  ).join('');
  document.getElementById('step-counter').textContent = `${cur + 1} / ${steps.length}`;
  document.getElementById('step-badge').textContent = s.badge;
  document.getElementById('step-badge').className = 'st-step-num pill ' + s.badgeClass;
  document.getElementById('step-title').textContent = s.title;
  document.getElementById('explain-label').textContent = s.label;
  document.getElementById('explain-main').innerHTML = s.main;
  document.getElementById('explain-insight').innerHTML = s.insight;
  document.getElementById('step-iter').textContent = s.iter;
  document.getElementById('step-svg').innerHTML = s.svg;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === steps.length - 1;
}
function nextStep() { if (cur < steps.length - 1) { cur++; render(); } }
function prevStep() { if (cur > 0) { cur--; render(); } }
render();
</script>
